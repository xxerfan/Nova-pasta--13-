<script>
(function() {
    const header = document.getElementById('main-header');
    const topBar = document.getElementById('top-bar');
    const backTop = document.getElementById('back-to-top');

    // [CORREÇÃO APLICADA]: Atualiza diretamente a altura do contêiner pai "header" injetado pelo main.js
    function updateSpacerHeight() { 
        const headerElement = document.getElementById('main-header');
        const headerWrapper = document.getElementById('header');
        if (headerElement && headerWrapper) {
            headerWrapper.style.minHeight = headerElement.offsetHeight + 'px';
        }
    }

    // Evento de Scroll da página
    let ticking = false;
    window.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(function() {
                const scrollY = window.pageYOffset;
                
                // Se descer a página, esconde a topbar para o header ficar mais fino
                if (topBar) {
                    if (scrollY > 60) { topBar.style.maxHeight = '0'; topBar.style.padding = '0'; } 
                    else { topBar.style.maxHeight = ''; topBar.style.padding = ''; }
                }
                
                // Adiciona sombra ao header
                if (header) scrollY > 60 ? header.classList.add('scrolled') : header.classList.remove('scrolled');
                
                // Mostra/Esconde o botão "Voltar ao topo"
                if (backTop) {
                    if (scrollY > 400) { backTop.classList.remove('opacity-0', 'invisible'); backTop.classList.add('opacity-100', 'visible'); } 
                    else { backTop.classList.add('opacity-0', 'invisible'); backTop.classList.remove('opacity-100', 'visible'); }
                }
                
                updateSpacerHeight();
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });

    // Destaca a página atual no menu
    function setActiveLink() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-item-pro[data-page]').forEach(l => {
            if (l.getAttribute('data-page') === currentPage) l.classList.add('active');
        });
    }

    // Lógica de abrir/fechar o Menu Mobile
    const mobileBtn = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIcon = document.getElementById('menu-icon');
    let menuOpen = false;

    if (mobileBtn && mobileMenu) {
        mobileBtn.addEventListener('click', function() {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden');
                if (menuIcon) menuIcon.className = 'fas fa-times text-base'; // Ícone de Fechar
            } else {
                mobileMenu.classList.add('hidden');
                if (menuIcon) menuIcon.className = 'fas fa-bars text-base'; // Ícone de Hambúrguer
            }
        });
    }

    // Ação do Botão Voltar ao Topo
    if (backTop) backTop.addEventListener('click', e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

    // Inicialização
    updateSpacerHeight(); 
    setActiveLink();
    window.addEventListener('resize', updateSpacerHeight, { passive: true });
})();
</script>
