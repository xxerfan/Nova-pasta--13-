<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Xerfan Tech Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
        
        /* Animação do Modal */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col hidden md:flex z-20">
        <div class="h-20 flex items-center px-6 border-b border-gray-800">
            <div class="w-8 h-8 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center text-white font-black shadow-lg mr-3">X</div>
            <span class="font-bold text-white tracking-wide">Xerfan Admin</span>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <p class="px-2 text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Conteúdo do Site</p>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-orange-500/10 text-orange-500 rounded-xl transition-colors font-medium">
                <i class="fas fa-box w-5"></i> Gestão de Produtos
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-colors font-medium">
                <i class="fas fa-cogs w-5"></i> Serviços (Em breve)
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <a href="login.html" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-xl transition-colors text-sm font-medium">
                <i class="fas fa-sign-out-alt w-5"></i> Sair
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative">
        
        <header class="h-20 bg-gray-900/80 backdrop-blur-md border-b border-gray-800 flex items-center justify-between px-8 z-10">
            <div>
                <h2 class="text-xl font-bold text-white">Produtos</h2>
                <p class="text-xs text-gray-400">Gerencie a vitrine do seu site.</p>
            </div>
            <div class="flex items-center gap-4">
                <a href="../produtos.html" target="_blank" class="text-sm font-medium text-gray-400 hover:text-orange-500 transition-colors flex items-center gap-2">
                    Ver Site <i class="fas fa-external-link-alt text-xs"></i>
                </a>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="absolute top-0 right-0 w-64 h-64 bg-orange-500/5 rounded-full blur-3xl pointer-events-none"></div>

            <div class="bg-gray-900 border border-gray-800 rounded-2xl shadow-sm overflow-hidden relative z-10">
                <div class="p-6 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="font-bold text-white">Banco de Dados: Produtos</h3>
                    <button onclick="abrirModal()" class="bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-lg shadow-orange-500/20 transition-all flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i class="fas fa-plus"></i> Novo Produto
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-800/50 text-gray-400 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4 font-medium">Nome do Produto</th>
                                <th class="px-6 py-4 font-medium">Categoria</th>
                                <th class="px-6 py-4 font-medium">Preço (R$)</th>
                                <th class="px-6 py-4 font-medium">Status</th>
                                <th class="px-6 py-4 text-right font-medium">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos" class="divide-y divide-gray-800">
                            <tr>
                                <td colspan="5" class="px-6 py-8 text-center text-gray-500">Carregando dados do Firebase...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-produto" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-gray-900 border border-gray-700 w-full max-w-lg rounded-3xl shadow-2xl modal-enter overflow-hidden">
            
            <div class="px-8 py-6 border-b border-gray-800 flex justify-between items-center bg-gray-800/30">
                <h3 class="text-xl font-bold text-white">Cadastrar Produto</h3>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-times text-lg"></i></button>
            </div>

            <form id="form-novo-produto" class="p-8 space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nome do Produto</label>
                    <input type="text" id="prod-nome" required placeholder="Ex: Teclado Mecânico RGB" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all">
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Categoria</label>
                        <select id="prod-categoria" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all appearance-none">
                            <option value="computadores">Computadores</option>
                            <option value="acessorios">Acessórios</option>
                            <option value="smarthome">Smart Home</option>
                            <option value="seguranca">Segurança</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Preço (R$)</label>
                        <input type="number" step="0.01" id="prod-preco" required placeholder="299.90" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Status</label>
                    <select id="prod-status" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none appearance-none">
                        <option value="ativo">Disponível no Site</option>
                        <option value="inativo">Oculto (Rascunho)</option>
                    </select>
                </div>

                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="fecharModal()" class="px-6 py-3 text-sm font-bold text-gray-400 hover:text-white transition-colors">Cancelar</button>
                    <button type="submit" id="btn-salvar" class="px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white text-sm font-bold rounded-xl shadow-lg shadow-orange-500/20 transition-all flex items-center gap-2">
                        Salvar no Banco <i class="fas fa-cloud-upload-alt"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Importa as ferramentas do Firebase via internet (CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. A SUA CHAVE DE CONFIGURAÇÃO (Copiada do seu projeto)
        const firebaseConfig = {
            apiKey: "AIzaSyCpxfzPrj1DJpcv-bHsVtR1Y7NSVN3KRTI",
            authDomain: "xerfan-tech-lab.firebaseapp.com",
            projectId: "xerfan-tech-lab",
            storageBucket: "xerfan-tech-lab.firebasestorage.app",
            messagingSenderId: "931331197336",
            appId: "1:931331197336:web:ca2550d7d10da44fbb43ed",
            measurementId: "G-Y95PLZ075T"
        };

        // 3. Inicia o Firebase e o Banco de Dados (Firestore)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referência à tabela (coleção) "produtos" no banco
        const produtosRef = collection(db, "produtos");

        // ==========================================
        // LÓGICA DE SALVAR DADOS (CREATE)
        // ==========================================
        document.getElementById('form-novo-produto').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar
            
            const btn = document.getElementById('btn-salvar');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;

            try {
                // Pega os valores que você digitou
                const novoProduto = {
                    nome: document.getElementById('prod-nome').value,
                    categoria: document.getElementById('prod-categoria').value,
                    preco: parseFloat(document.getElementById('prod-preco').value),
                    status: document.getElementById('prod-status').value,
                    data_criacao: new Date().toISOString() // Salva a hora exata
                };

                // Comando mágico: Envia para a nuvem da Google!
                await addDoc(produtosRef, novoProduto);
                
                // Sucesso
                fecharModal();
                document.getElementById('form-novo-produto').reset();
                alert("Produto salvo com sucesso no banco de dados!");

            } catch (error) {
                console.error("Erro ao salvar: ", error);
                alert("Erro ao salvar. Verifique se o Firestore está no 'Modo de Teste'.");
            } finally {
                btn.innerHTML = 'Salvar no Banco <i class="fas fa-cloud-upload-alt"></i>';
                btn.disabled = false;
            }
        });

        // ==========================================
        // LÓGICA DE LER DADOS (READ) - EM TEMPO REAL!
        // ==========================================
        const tabela = document.getElementById('tabela-produtos');

        // O 'onSnapshot' fica "escutando" o banco. Se você mudar lá, muda aqui na hora.
        onSnapshot(produtosRef, (querySnapshot) => {
            tabela.innerHTML = ''; // Limpa a tabela
            
            if (querySnapshot.empty) {
                tabela.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Nenhum produto cadastrado ainda. Clique em "Novo Produto".</td></tr>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const produto = docSnap.data();
                const id = docSnap.id; // O ID único gerado pelo Firebase

                // Define o ícone com base na categoria
                let icone = 'fa-box';
                if(produto.categoria === 'computadores') icone = 'fa-laptop';
                if(produto.categoria === 'smarthome') icone = 'fa-lightbulb';
                if(produto.categoria === 'acessorios') icone = 'fa-keyboard';
                if(produto.categoria === 'seguranca') icone = 'fa-shield-alt';

                // Cria a linha da tabela
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-800/50 transition-colors group';
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-white flex items-center gap-3">
                        <div class="w-8 h-8 bg-gray-800 rounded flex items-center justify-center text-gray-500"><i class="fas ${icone}"></i></div>
                        ${produto.nome}
                    </td>
                    <td class="px-6 py-4 text-gray-400 capitalize">${produto.categoria}</td>
                    <td class="px-6 py-4 text-gray-300">R$ ${produto.preco.toFixed(2).replace('.', ',')}</td>
                    <td class="px-6 py-4">
                        <span class="${produto.status === 'ativo' ? 'bg-green-500/10 text-green-500 border-green-500/20' : 'bg-gray-500/10 text-gray-400 border-gray-500/20'} border px-2 py-1 rounded text-xs font-medium">
                            ${produto.status === 'ativo' ? 'Visível' : 'Oculto'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deletarProduto('${id}')" class="text-gray-500 hover:text-red-500 px-2 transition-colors" title="Apagar">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        });

        // ==========================================
        // LÓGICA PARA DELETAR (DELETE)
        // Precisamos expor a função para o HTML poder chamá-la
        // ==========================================
        window.deletarProduto = async (id) => {
            if(confirm("Tem a certeza que quer apagar este produto?")) {
                try {
                    await deleteDoc(doc(db, "produtos", id));
                } catch (e) {
                    console.error(e);
                    alert("Erro ao deletar.");
                }
            }
        };
    </script>

    <script>
        const modal = document.getElementById('modal-produto');
        function abrirModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function fecharModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        // Fecha se clicar fora da caixa preta
        modal.addEventListener('click', (e) => {
            if (e.target === modal) fecharModal();
        });
    </script>

</body>
</html>
